name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Sync server.json version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          jq --arg v "$VERSION" '.version=$v | (.packages[].version)=$v' server.json > server.tmp && mv server.tmp server.json
          echo "server.json version -> $VERSION"

      - name: Install mcp-publisher
        run: curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry (idempotent)
        run: |
          NAME=$(jq -r .name server.json)
          VER=$(jq -r .version server.json)
          PUB=$(curl -sL "https://registry.modelcontextprotocol.io/v0/servers?search=$NAME" \
            | jq -r --arg n "$NAME" '.servers[]? | .server | select(.name==$n) | .version' | sort -V | tail -1)
          echo "server.json: $NAME v$VER | registry latest: ${PUB:-none}"
          if [ "$PUB" = "$VER" ]; then
            echo "Version $VER already published — skipping (idempotent, no failure)."
          else
            ./mcp-publisher publish
          fi
